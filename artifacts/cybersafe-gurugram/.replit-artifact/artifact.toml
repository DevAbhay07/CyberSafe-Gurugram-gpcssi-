kind = "web"
previewPath = "/"
title = "CyberSafe Gurugram"
version = "1.0.0"
id = "artifacts/cybersafe-gurugram"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21182

[services.development]
run = "pnpm --filter @workspace/cybersafe-gurugram run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cybersafe-gurugram", "run", "build" ]
publicDir = "artifacts/cybersafe-gurugram/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21182"
BASE_PATH = "/"
